; cPanel-generated php ini directives, do not edit
; Manual editing of this file may result in unexpected behavior.
; To make changes to this file, use the cPanel MultiPHP INI Editor (Home >> Software >> MultiPHP INI Editor)
; For more information, read our documentation (https://go.cpanel.net/EA4ModifyINI)

[PHP]
display_errors = Off
max_execution_time = 30
max_input_time = 60
max_input_vars = 1000
memory_limit = 384M
post_max_size = 256M
session.gc_maxlifetime = 1440
session.save_path = "/var/cpanel/php/sessions/ea-php71"
upload_max_filesize = 256M
zlib.output_compression = Off
html_errors = Off
docref_root = "0"
docref_ext = "0"

; ── Configuración adicional EGS (producción) ──────────────────────────────────
; Registrar errores en log (no mostrarlos al navegador)
log_errors = On
error_reporting = 22527

; Zona horaria del sistema
date.timezone = America/Mexico_City

; Sesiones seguras (requiere HTTPS activo)
session.cookie_httponly = 1
session.cookie_secure = 1
session.use_strict_mode = 1

; Ocultar versión de PHP en headers HTTP
expose_php = Off
